services:

  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yaring
      POSTGRES_PASSWORD: yaring_secret
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaring"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yaring-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass yaring_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "yaring_redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yaring-net

  # ─── Backend microservices ────────────────────────────────────────────────
  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP: auth
    restart: unless-stopped
    environment:
      AUTH_PORT: 3001
      AUTH_DB_URL: postgresql://yaring:yaring_secret@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-yaring-dev-secret-change-me-in-prod}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-30d}
      REDIS_URL: redis://:yaring_redis@redis:6379
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-secret}
      ADMIN_PHONE: ${ADMIN_PHONE:-+79990000000}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yaring-net

  catalog:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP: catalog
    restart: unless-stopped
    environment:
      CATALOG_PORT: 3002
      CATALOG_DB_URL: postgresql://yaring:yaring_secret@postgres:5432/catalog_db
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-secret}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yaring-net

  booking:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP: booking
    restart: unless-stopped
    environment:
      BOOKING_PORT: 3003
      BOOKING_DB_URL: postgresql://yaring:yaring_secret@postgres:5432/booking_db
      CATALOG_SERVICE_URL: http://catalog:3002
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-secret}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yaring-net

  payment:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP: payment
    restart: unless-stopped
    environment:
      PAYMENT_PORT: 3004
      PAYMENT_DB_URL: postgresql://yaring:yaring_secret@postgres:5432/payment_db
      BOOKING_SERVICE_URL: http://booking:3003
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-secret}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL:-http://localhost:3000/profile}
      YOOKASSA_WEBHOOK_SECRET: ${YOOKASSA_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yaring-net

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP: gateway
    restart: unless-stopped
    environment:
      GATEWAY_PORT: 4000
      AUTH_SERVICE_URL: http://auth:3001
      CATALOG_SERVICE_URL: http://catalog:3002
      BOOKING_SERVICE_URL: http://booking:3003
      PAYMENT_SERVICE_URL: http://payment:3004
      JWT_SECRET: ${JWT_SECRET:-yaring-dev-secret-change-me-in-prod}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      - auth
      - catalog
      - booking
      - payment
    networks:
      - yaring-net

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_URL: http://gateway:4000/api
    restart: unless-stopped
    environment:
      # Browser (client-side) must reach the gateway via the host-published port,
      # not the internal Docker DNS name. API calls run in onMounted (client only).
      NUXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - yaring-net

volumes:
  postgres_data:
  redis_data:

networks:
  yaring-net:
    driver: bridge
